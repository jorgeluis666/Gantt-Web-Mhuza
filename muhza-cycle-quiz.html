<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cycle Quiz — Muhza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F3EADC; --cream-light:#FBF6EE; --cream-tint:#EFE3D2;
    --ink:#3A2A1E; --brown:#5C4332; --taupe:#A8917B;
    --line:rgba(58,42,30,0.16);
    --serif:'Cormorant Garamond', Georgia, serif; --sans:'Jost', sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--sans);color:var(--ink);background:var(--cream);
    background-image:radial-gradient(120% 80% at 50% -10%, rgba(255,255,255,0.45), transparent 60%),
      radial-gradient(100% 60% at 50% 120%, rgba(168,145,123,0.18), transparent 60%);
    min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
  }
  .bar{display:flex;align-items:center;justify-content:space-between;padding:22px 28px;border-bottom:1px solid var(--line);position:relative;flex-shrink:0;}
  .wordmark{position:absolute;left:50%;transform:translateX(-50%);font-weight:400;letter-spacing:.42em;font-size:15px;text-indent:.42em;color:var(--ink);}
  .back{font-size:13px;letter-spacing:.04em;color:var(--brown);background:none;border:none;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;}
  .back.show{opacity:1;pointer-events:auto;}
  .back:hover{color:var(--ink);}
  .progress{font-size:12px;letter-spacing:.18em;color:var(--taupe);min-width:54px;text-align:right;}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px 64px;}
  .screen{width:100%;max-width:760px;text-align:center;animation:rise .6s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .eyebrow{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--taupe);margin-bottom:22px;}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(44px,8vw,74px);line-height:1.02;letter-spacing:.01em;}
  h2{font-family:var(--serif);font-weight:500;font-size:clamp(30px,5vw,46px);line-height:1.08;}
  .lede{font-weight:300;font-size:17px;line-height:1.65;color:var(--brown);max-width:430px;margin:20px auto 0;}
  .rings{margin:0 auto 30px;display:block;}
  .rings circle{fill:none;stroke:var(--taupe);stroke-width:1;opacity:.55;}
  .rings circle:nth-child(1){opacity:.9;stroke:var(--brown);}
  .btn{font-weight:400;font-size:14px;letter-spacing:.16em;text-transform:uppercase;background:var(--ink);color:var(--cream-light);border:none;cursor:pointer;padding:17px 46px;margin-top:38px;border-radius:2px;transition:background .25s, transform .25s;}
  .btn:hover{background:var(--brown);transform:translateY(-1px);}
  .btn.ghost{background:none;color:var(--brown);border:1px solid var(--line);}
  .btn.ghost:hover{background:var(--cream-tint);color:var(--ink);}
  .btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:36px;}
  .btn-row .btn{margin-top:0;}
  .q-prompt{font-family:var(--serif);font-weight:500;font-size:clamp(28px,4.6vw,42px);line-height:1.1;margin-bottom:38px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:540px;margin:0 auto;}
  .stack{display:flex;flex-direction:column;gap:11px;max-width:460px;margin:0 auto;}
  .opt{font-family:var(--serif);font-size:21px;color:var(--ink);background:var(--cream-light);border:1px solid var(--line);border-radius:3px;padding:24px 20px;cursor:pointer;transition:all .22s;line-height:1.25;display:flex;align-items:center;justify-content:center;min-height:96px;text-align:center;}
  .stack .opt{min-height:0;padding:19px 24px;font-size:20px;}
  .opt:hover{background:var(--cream-tint);border-color:var(--taupe);transform:translateY(-2px);}
  .opt .dot{width:7px;height:7px;border-radius:50%;background:var(--taupe);margin-right:12px;flex-shrink:0;opacity:0;transition:opacity .2s;}
  .opt:hover .dot{opacity:1;}
  /* centered single field (capture) */
  .field-center{max-width:340px;margin:34px auto 0;}
  .field-center input{width:100%;font-family:var(--serif);font-size:24px;text-align:center;color:var(--ink);background:transparent;border:none;border-bottom:1px solid var(--line);padding:10px 2px;outline:none;transition:border-color .2s;}
  .field-center input::placeholder{color:#c3b3a0;font-style:italic;}
  .field-center input:focus{border-color:var(--brown);}
  .consent{font-weight:300;font-size:12px;line-height:1.55;color:var(--taupe);max-width:360px;margin:24px auto 0;}
  .skip{display:block;margin:18px auto 0;background:none;border:none;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);cursor:pointer;}
  .skip:hover{color:var(--ink);}
  /* loading */
  .loader .rings circle{animation:breathe 1.8s ease-in-out infinite;}
  .loader .rings circle:nth-child(2){animation-delay:.18s;}
  .loader .rings circle:nth-child(3){animation-delay:.36s;}
  .loader .rings circle:nth-child(4){animation-delay:.54s;}
  @keyframes breathe{0%,100%{opacity:.3;}50%{opacity:.95;}}
  .loading-text{font-family:var(--serif);font-style:italic;font-size:26px;color:var(--brown);margin-top:26px;}
  /* result */
  .reveal-note{font-weight:300;font-size:16.5px;line-height:1.7;color:var(--brown);max-width:440px;margin:18px auto 0;}
  .rule{width:46px;height:1px;background:var(--taupe);margin:40px auto 36px;opacity:.6;}
  .bundle-title{font-family:var(--serif);font-weight:600;font-size:clamp(28px,4.4vw,40px);}
  .bundle-ritual{font-weight:300;font-size:16px;line-height:1.78;color:var(--brown);max-width:480px;margin:18px auto 0;}
  .lineup{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:36px auto 6px;}
  .bottle-item{display:flex;flex-direction:column;align-items:center;gap:9px;width:78px;}
  .bottle-item svg .cap{fill:var(--taupe);}
  .bottle-item svg .neck{fill:var(--taupe);opacity:.7;}
  .bottle-item svg .body{fill:var(--cream-light);stroke:var(--line);stroke-width:1.5;}
  .bottle-item svg .lbl{fill:var(--cream-tint);stroke:rgba(58,42,30,0.10);stroke-width:1;}
  .bottle-item.active svg .cap{fill:var(--ink);}
  .bottle-item.active svg .neck{fill:var(--ink);opacity:.85;}
  .bottle-item.active svg .body{stroke:var(--ink);stroke-width:2.2;}
  .bottle-item.active svg .lbl{fill:#fff;stroke:var(--taupe);}
  .b-name{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--taupe);}
  .bottle-item.active .b-name{color:var(--ink);}
  .b-phase{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--taupe);}
  .bottle-item.active .b-phase{color:var(--brown);}
  .offer{font-family:var(--serif);font-size:21px;line-height:1.45;color:var(--ink);max-width:420px;margin:32px auto 0;}
  .checkin{font-weight:300;font-size:13px;letter-spacing:.03em;color:var(--taupe);margin-top:26px;}
  .retake{margin-top:22px;background:none;border:none;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);cursor:pointer;}
  .retake:hover{color:var(--ink);}
  @media(max-width:480px){
    .grid{gap:10px;} .opt{font-size:19px;min-height:84px;padding:18px 14px;}
    .bar{padding:18px 18px;} .wordmark{font-size:13px;} .lineup{gap:16px;}
  }
</style>
</head>
<body>
  <div class="bar">
    <button class="back" id="backBtn">&larr; Back</button>
    <div class="wordmark">MUHZA</div>
    <div class="progress" id="progress"></div>
  </div>
  <div class="stage"><div class="screen" id="screen"></div></div>

<script>
const PHASES = {
  menstrual:{serum:'Muna', note:"Your skin runs dry and a little reactive when estrogen dips. Muna is formulated for this window, when your skin wants comfort and replenishment."},
  follicular:{serum:'Puri', note:"Estrogen is climbing and your skin is finding its rhythm again. Puri is formulated for the fresh start, made to support skin as it rebuilds."},
  ovulatory:{serum:'Qori', note:"This is your skin at its brightest, and often its busiest. Qori is formulated for the peak."},
  luteal:{serum:'Ayni', note:"Progesterone rises and skin can turn congested before your period. Ayni is formulated for this stretch, when skin wants clarity and calm."}
};
const ORDER = ['menstrual','follicular','ovulatory','luteal'];
const RITUAL = "Four serums, one for each phase. Begin with Muna during your period, when skin wants comfort. Move to Puri as your skin finds its rhythm in the follicular days. Reach for Qori through ovulation, when skin is at its brightest. Close the month with Ayni in the luteal stretch, when skin wants clarity and calm. One ritual that moves with you, every phase, every month.";

const QUIZ = [
  { prompt:"Where are you in your cycle right now?", layout:"stack", options:[
    {label:"I'm on my period", phase:"menstrual"},
    {label:"My period wrapped recently and I feel fresh", phase:"follicular"},
    {label:"About two weeks since my period started", phase:"ovulatory"},
    {label:"My period is due soon", phase:"luteal"},
    {label:"I'm not sure, or my cycle is irregular", phase:null}
  ]},
  { prompt:"How is your skin behaving this week?", layout:"grid", options:[
    {label:"Dry, tight, a little dull", phase:"menstrual"},
    {label:"Clear and easy", phase:"follicular"},
    {label:"Radiant and plump, maybe a little shiny", phase:"ovulatory"},
    {label:"Congested and oilier than usual", phase:"luteal"}
  ]},
  { prompt:"Your energy right now is...", layout:"grid", options:[
    {label:"Low, I want to slow down", phase:"menstrual"},
    {label:"Climbing, I feel like myself again", phase:"follicular"},
    {label:"Peaking, I feel social and on", phase:"ovulatory"},
    {label:"Dipping, a little wired or moody", phase:"luteal"}
  ]},
  { prompt:"How do you feel in yourself?", layout:"grid", options:[
    {label:"Quiet and inward", phase:"menstrual"},
    {label:"Optimistic and motivated", phase:"follicular"},
    {label:"Confident and outgoing", phase:"ovulatory"},
    {label:"Irritable or flat", phase:"luteal"}
  ]},
  { prompt:"And in your body?", layout:"grid", options:[
    {label:"Cramps and fatigue", phase:"menstrual"},
    {label:"Light, no complaints", phase:"follicular"},
    {label:"Energized and warm", phase:"ovulatory"},
    {label:"Bloated and tender", phase:"luteal"}
  ]}
];

const N = QUIZ.length;
const S_NAME=N+1, S_EMAIL=N+2, S_PERIOD=N+3, S_LOAD=N+4, S_RESULT=N+5;
let step = 0;
const answers = new Array(N).fill(null);
let firstName = "";

const screen = document.getElementById('screen');
const backBtn = document.getElementById('backBtn');
const progress = document.getElementById('progress');

backBtn.addEventListener('click', ()=>{ if(step>0 && step!==S_LOAD && step!==S_RESULT){ step--; render(); }});

function ringsSVG(){
  return '<svg class="rings" width="86" height="86" viewBox="0 0 86 86">'+
    '<circle cx="43" cy="43" r="13"/><circle cx="43" cy="43" r="22"/>'+
    '<circle cx="43" cy="43" r="31"/><circle cx="43" cy="43" r="40"/></svg>';
}

function render(){
  backBtn.classList.toggle('show', step>0 && step!==S_LOAD && step!==S_RESULT);
  progress.textContent = (step>=1 && step<=N) ? (step + " / " + N) : "";
  if(step===0) renderIntro();
  else if(step<=N) renderQuestion(step-1);
  else if(step===S_NAME) renderName();
  else if(step===S_EMAIL) renderEmail();
  else if(step===S_PERIOD) renderPeriod();
  else if(step===S_LOAD) renderLoading();
  else renderResult();
}

function renderIntro(){
  screen.innerHTML = ringsSVG()+
    '<div class="eyebrow">Muhza</div><h1>The Cycle Quiz</h1>'+
    '<p class="lede">Your skin changes with your cycle. In five questions, find the phase you are in today and the serum made for it.</p>'+
    '<button class="btn" id="begin">Begin</button>';
  document.getElementById('begin').onclick = ()=>{ step=1; render(); };
}

function renderQuestion(i){
  const q = QUIZ[i];
  const cls = q.layout==='grid' ? 'grid':'stack';
  const opts = q.options.map((o,idx)=>'<button class="opt" data-i="'+idx+'"><span class="dot"></span>'+o.label+'</button>').join('');
  screen.innerHTML = '<div class="q-prompt">'+q.prompt+'</div><div class="'+cls+'">'+opts+'</div>';
  screen.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick = ()=>{ answers[i]=q.options[+btn.dataset.i].phase; step++; render(); };
  });
}

function renderName(){
  screen.innerHTML =
    '<h2>Your ritual is ready</h2>'+
    '<p class="lede">Just a few things. What is your first name?</p>'+
    '<div class="field-center"><input id="fn" type="text" placeholder="Enter your first name"></div>'+
    '<button class="btn" id="next">Continue</button>';
  const fn=document.getElementById('fn'); fn.value=firstName; fn.focus();
  document.getElementById('next').onclick = ()=>{ firstName=fn.value.trim(); step=S_EMAIL; render(); };
}

function renderEmail(){
  screen.innerHTML =
    '<h2>Where should we send it?</h2>'+
    '<p class="lede">So you can keep your reading and get reminders timed to your cycle.</p>'+
    '<div class="field-center"><input id="em" type="email" placeholder="you@email.com"></div>'+
    '<p class="consent">We use this to personalize your routine and send reminders timed to your cycle. Unsubscribe anytime.</p>'+
    '<button class="btn" id="next">Continue</button>';
  document.getElementById('em').focus();
  document.getElementById('next').onclick = ()=>{ step=S_PERIOD; render(); };
}

function renderPeriod(){
  screen.innerHTML =
    '<h2>One last thing</h2>'+
    '<p class="lede">When did your last period start? This lets us time your reminders to your cycle. Optional.</p>'+
    '<div class="field-center"><input id="lp" type="date"></div>'+
    '<button class="btn" id="next">See my ritual</button>'+
    '<button class="skip" id="skip">Skip for now</button>';
  document.getElementById('next').onclick = ()=>{ step=S_LOAD; render(); };
  document.getElementById('skip').onclick = ()=>{ step=S_LOAD; render(); };
}

function renderLoading(){
  screen.innerHTML = '<div class="loader">'+ringsSVG()+'<div class="loading-text">Reading your cycle...</div></div>';
  setTimeout(()=>{ step=S_RESULT; render(); }, 1900);
}

function scorePhase(){
  const scores={menstrual:0,follicular:0,ovulatory:0,luteal:0};
  answers.forEach((p,idx)=>{ if(p) scores[p]+=(idx===0?2:1); });
  let best=ORDER[0];
  ORDER.forEach(p=>{ if(scores[p]>scores[best]) best=p; });
  const q1=answers[0];
  if(q1 && scores[q1]===scores[best]) best=q1;
  return best;
}

function bottle(serum, phase, active){
  return '<div class="bottle-item'+(active?' active':'')+'">'+
    '<svg viewBox="0 0 60 120" width="46" height="92">'+
      '<rect class="cap" x="21" y="3" width="18" height="13" rx="2"/>'+
      '<rect class="neck" x="25" y="15" width="10" height="6"/>'+
      '<rect class="body" x="13" y="20" width="34" height="94" rx="9"/>'+
      '<rect class="lbl" x="18" y="55" width="24" height="34" rx="2"/>'+
    '</svg>'+
    '<div class="b-name">'+serum+'</div><div class="b-phase">'+phase+'</div></div>';
}

function renderResult(){
  const phase=scorePhase();
  const {serum,note}=PHASES[phase];
  const greet = firstName ? ('For '+firstName) : 'Your reading';
  const bottles = ORDER.map(p=>bottle(PHASES[p].serum, p, p===phase)).join('');
  screen.innerHTML =
    '<div class="eyebrow">'+greet+'</div>'+
    '<h2>Seems like you\u2019re in your<br>'+phase+' phase</h2>'+
    '<p class="reveal-note">'+note+'</p>'+
    '<div class="rule"></div>'+
    '<div class="bundle-title">The Muyu Bundle</div>'+
    '<p class="bundle-ritual">'+RITUAL+'</p>'+
    '<div class="lineup">'+bottles+'</div>'+
    '<p class="offer">Your Muyu Bundle is 15% off when you take all four phases together.</p>'+
    '<div class="btn-row">'+
      '<button class="btn" onclick="return false">Shop the Muyu Bundle</button>'+
      '<button class="btn ghost" onclick="return false">Shop '+serum+'</button>'+
    '</div>'+
    '<div class="checkin">We will check in as your cycle moves.</div>'+
    '<button class="retake" id="retake">Retake the quiz</button>';
  document.getElementById('retake').onclick = ()=>{ step=0; answers.fill(null); firstName=""; render(); };
}

render();
</script>
</body>
</html>
